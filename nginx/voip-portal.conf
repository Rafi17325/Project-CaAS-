# ============================================================
# Nginx Config — VoIP Portal
# Browser → Nginx → Kamailio (UDP 5060 internal)
#
# Arsitektur:
#   Browser (SIP.js) → ws://IP/ws → Nginx → Kamailio :8080
#   Next.js API      → HTTP       → Nginx → Kamailio :5080 (JSONRPC)
#   Kamailio internally: SIP/UDP port 5060
# ============================================================

server {
    listen 80;
    server_name _;          # Ganti dengan domain/IP jika ada

    # ── Proxy ke Next.js (Vercel serve atau local) ──────────
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ke Kamailio (SIP.js connect ke /ws) ───────
    # Nginx menerima WebSocket dari browser, meneruskan ke
    # Kamailio port 8080. Kamailio lalu routing via UDP 5060.
    location /ws {
        proxy_pass          http://127.0.0.1:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # CORS untuk browser
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Upgrade, Connection, Host" always;
    }

    # ── JSONRPC Kamailio (hanya dari server/lokal) ───────────
    # Digunakan Next.js API Route untuk validasi nomor
    location /rpc {
        # Batasi hanya dari localhost (Next.js API)
        allow   127.0.0.1;
        deny    all;

        proxy_pass          http://127.0.0.1:5080/rpc;
        proxy_http_version  1.1;
        proxy_set_header    Host        $host;
        proxy_set_header    X-Real-IP   $remote_addr;
        proxy_read_timeout  10s;
    }
}

